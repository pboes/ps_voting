<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick Your Favourite</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --border: #2e3347;
      --accent: #6c63ff;
      --accent-hover: #857dff;
      --accent-dim: #6c63ff22;
      --text: #e8eaf6;
      --text-muted: #8b90a7;
      --success: #4caf93;
      --error: #e05c5c;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px #00000066;
    }

    /* Top bar: connection status */
    .topbar {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 28px;
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .conn-dot.connected { background: var(--success); }

    .conn-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* Progress pip track */
    .pips {
      display: flex;
      gap: 6px;
      margin-bottom: 32px;
    }
    .pip {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }
    .pip.done   { background: var(--success); }
    .pip.active { background: var(--accent); }

    /* Round heading */
    .round-heading {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .question {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 22px;
      color: var(--text);
    }

    /* Option cards */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .opt {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 18px 22px;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      line-height: 1.3;
    }

    .opt-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .opt:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    .opt.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    /* Confirm screen */
    .confirm-heading {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .confirm-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .summary {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 22px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-key { color: var(--text-muted); }
    .summary-val { font-weight: 700; font-size: 0.95rem; text-align: right; max-width: 58%; }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s, transform 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      flex: 0 0 auto;
      padding: 14px 20px;
    }
    .btn-ghost:hover { background: var(--border); color: var(--text); }

    .err-msg {
      margin-top: 14px;
      background: #e05c5c18;
      border: 1px solid var(--error);
      border-radius: 10px;
      color: var(--error);
      font-size: 0.83rem;
      padding: 11px 14px;
      line-height: 1.5;
      display: none;
    }
    .err-msg.visible { display: block; }

    .no-wallet-msg {
      margin-top: 14px;
      background: #6c63ff18;
      border: 1px solid var(--accent);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 0.83rem;
      padding: 11px 14px;
      line-height: 1.5;
      display: none;
    }
    .no-wallet-msg.visible { display: block; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Done screen */
    .done-screen {
      text-align: center;
      padding: 8px 0 4px;
    }
    .done-icon { font-size: 3rem; margin-bottom: 16px; }
    .done-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .done-sub { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
    .done-winner {
      margin-top: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .done-winner span { color: var(--accent); }

    @media (max-width: 380px) {
      .card { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<div class="card" id="app"></div>

<script>
// ── Inline miniapp-sdk (adapted from @aboutcircles/miniapp-sdk v0.1.24) ──────
(function () {
  var _address = null;
  var _listeners = [];
  var _dataListeners = [];
  var _requestCounter = 0;
  var _pending = {};

  window.addEventListener("message", function (event) {
    var d = event.data;
    if (!d || !d.type) return;
    switch (d.type) {
      case "app_data":
        _dataListeners.forEach(function (fn) { fn(d.data); });
        break;
      case "wallet_connected":
        _address = d.address;
        _listeners.forEach(function (fn) { fn(_address); });
        break;
      case "wallet_disconnected":
        _address = null;
        _listeners.forEach(function (fn) { fn(null); });
        break;
      case "tx_success":
        if (_pending[d.requestId]) { _pending[d.requestId].resolve(d.hashes); delete _pending[d.requestId]; }
        break;
      case "tx_rejected":
        if (_pending[d.requestId]) { _pending[d.requestId].reject(new Error(d.error || d.reason || "Rejected")); delete _pending[d.requestId]; }
        break;
      case "sign_success":
        if (_pending[d.requestId]) { _pending[d.requestId].resolve({ signature: d.signature, verified: d.verified }); delete _pending[d.requestId]; }
        break;
      case "sign_rejected":
        if (_pending[d.requestId]) { _pending[d.requestId].reject(new Error(d.error || d.reason || "Rejected")); delete _pending[d.requestId]; }
        break;
    }
  });

  if (window.parent !== window) {
    window.parent.postMessage({ type: "request_address" }, "*");
  }

  window.MiniappSDK = {
    isMiniappMode: function () { return window.parent !== window; },
    onAppData: function (fn) { _dataListeners.push(fn); },
    onWalletChange: function (fn) {
      _listeners.push(fn);
      fn(_address);
      return function () {
        var idx = _listeners.indexOf(fn);
        if (idx !== -1) _listeners.splice(idx, 1);
      };
    },
    signMessage: function (message, signatureType) {
      return new Promise(function (resolve, reject) {
        var requestId = "req_" + (++_requestCounter);
        _pending[requestId] = { resolve: resolve, reject: reject };
        window.parent.postMessage({ type: "sign_message", requestId: requestId, message: message, signatureType: signatureType || "erc1271" }, "*");
      });
    }
  };
})();
</script>

<script>
// ── Options ───────────────────────────────────────────────────────────────────
const OPTIONS = [
  { id: "wot",   label: "The Web of Trust", icon: "🕸️"  },
  { id: "fun",   label: "Fun Money",         icon: "🎉"  },
  { id: "tribe", label: "Tribal Money",      icon: "🏕️"  },
  { id: "spend", label: "Spend Thanks",      icon: "🙏"  },
];
// Round 1: options[0] vs options[1]  (Web of Trust vs Fun Money)
// Round 2: options[2] vs options[3]  (Tribal Money  vs Spend Thanks)
// Final:   r1winner   vs r2winner

// ── DB (localStorage) ─────────────────────────────────────────────────────────
const DB_KEY = "ps_voting_votes_v2";

function loadVotes() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || "{}"); }
  catch { return {}; }
}

function saveVote(address, voteData) {
  const votes = loadVotes();
  votes[(address || "anon").toLowerCase()] = { ...voteData, timestamp: Date.now() };
  localStorage.setItem(DB_KEY, JSON.stringify(votes));
}

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  wallet:    null,   // address string or null
  step:      0,      // 0=r1  1=r2  2=final  3=confirm  4=done
  r1Winner:  null,   // option id
  r2Winner:  null,
  champion:  null,
  signing:   false,
  error:     null,
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const app = document.getElementById("app");

function optById(id) { return OPTIONS.find(o => o.id === id); }

function pips(activeStep) {
  return `<div class="pips">${[0,1,2,3].map(i =>
    `<div class="pip ${i < activeStep ? "done" : i === activeStep ? "active" : ""}"></div>`
  ).join("")}</div>`;
}

function topbar() {
  const connected = !!state.wallet;
  return `<div class="topbar">
    <span class="conn-dot ${connected ? "connected" : ""}"></span>
    <span class="conn-label">${connected ? "Wallet connected" : "No wallet connected"}</span>
  </div>`;
}

function optCard(opt) {
  return `<button class="opt" data-id="${opt.id}">
    <span class="opt-icon">${opt.icon}</span>
    ${opt.label}
  </button>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const { step, signing, error, wallet, r1Winner, r2Winner, champion } = state;

  // ── Done ──
  if (step === 4) {
    const w = optById(champion);
    app.innerHTML = `
      ${topbar()}
      <div class="done-screen">
        <div class="done-icon">✅</div>
        <div class="done-title">Vote recorded!</div>
        <div class="done-sub">Your choice has been signed and saved.</div>
        <div class="done-winner">Your favourite: <span>${w ? w.icon + " " + w.label : champion}</span></div>
      </div>`;
    return;
  }

  // ── Confirm ──
  if (step === 3) {
    const r1 = optById(r1Winner);
    const r2 = optById(r2Winner);
    const ch = optById(champion);
    app.innerHTML = `
      ${topbar()}
      ${pips(3)}
      <div class="confirm-heading">Confirm your vote</div>
      <div class="confirm-sub">Sign with your Gnosis passkey to submit.</div>
      <div class="summary">
        <div class="summary-row">
          <span class="summary-key">Round 1</span>
          <span class="summary-val">${r1 ? r1.icon + " " + r1.label : r1Winner}</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Round 2</span>
          <span class="summary-val">${r2 ? r2.icon + " " + r2.label : r2Winner}</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">🏆 Favourite</span>
          <span class="summary-val">${ch ? ch.icon + " " + ch.label : champion}</span>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="btn-back" ${signing ? "disabled" : ""}>← Back</button>
        <button class="btn btn-primary" id="btn-submit" ${signing || !wallet ? "disabled" : ""}>
          ${signing ? '<span class="spinner"></span>Signing…' : '✍️ Sign &amp; Submit'}
        </button>
      </div>
      <div class="no-wallet-msg ${!wallet ? "visible" : ""}">
        Open this app inside the Circles miniapp host to connect your wallet.
      </div>
      <div class="err-msg ${error ? "visible" : ""}">${error || ""}</div>`;

    document.getElementById("btn-back").addEventListener("click", () => { state.error = null; state.step = 2; render(); });
    document.getElementById("btn-submit").addEventListener("click", submitVote);
    return;
  }

  // ── Wizard steps 0‑2 ──
  const rounds = [
    { left: OPTIONS[0], right: OPTIONS[1], label: "Which do you prefer?" },
    { left: OPTIONS[2], right: OPTIONS[3], label: "Which do you prefer?" },
    {
      left:  optById(r1Winner) || OPTIONS[0],
      right: optById(r2Winner) || OPTIONS[2],
      label: "And your overall favourite?",
    },
  ];

  const roundNames = ["Round 1 of 3", "Round 2 of 3", "Final round"];
  const round = rounds[step];

  app.innerHTML = `
    ${topbar()}
    ${pips(step)}
    <div class="round-heading">${roundNames[step]}</div>
    <div class="question">${round.label}</div>
    <div class="options">
      ${optCard(round.left)}
      ${optCard(round.right)}
    </div>`;

  app.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      if (step === 0) { state.r1Winner = id; }
      if (step === 1) { state.r2Winner = id; }
      if (step === 2) { state.champion = id; }
      // Auto-advance
      if (step < 2) {
        state.step = step + 1;
      } else {
        state.step = 3; // go to confirm
      }
      render();
    });
  });
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submitVote() {
  if (!state.wallet) { state.error = "No wallet connected."; render(); return; }

  state.signing = true;
  state.error = null;
  render();

  const payload = JSON.stringify({
    action:    "ps_vote",
    voter:     state.wallet,
    r1Winner:  state.r1Winner,
    r2Winner:  state.r2Winner,
    champion:  state.champion,
    timestamp: Date.now(),
  });

  try {
    const result = await window.MiniappSDK.signMessage(payload, "erc1271");
    saveVote(state.wallet, {
      r1Winner:  state.r1Winner,
      r2Winner:  state.r2Winner,
      champion:  state.champion,
      signature: result.signature,
      verified:  result.verified,
    });
    state.signing = false;
    state.step = 4;
    render();
  } catch (err) {
    state.signing = false;
    state.error = err.message || "Signing was rejected or failed.";
    render();
  }
}

// ── Wallet watcher ────────────────────────────────────────────────────────────
window.MiniappSDK.onWalletChange(function (address) {
  state.wallet = address;
  render();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
