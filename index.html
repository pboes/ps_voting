<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick Your Favourite</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #faf5f1;
      color: #060a40;
      padding: 24px 16px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border: 1px solid #ede1d8;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
    }

    /* Progress pips */
    .pips {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    .pip {
      flex: 1; height: 3px;
      border-radius: 2px;
      background: #ede1d8;
      transition: background 0.3s;
    }
    .pip.done   { background: #158030; }
    .pip.active { background: #060a40; }

    /* Question */
    .round-heading {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6c8c;
      margin-bottom: 6px;
    }
    .question {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.4;
      margin-bottom: 20px;
      color: #060a40;
    }

    /* Option cards */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .opt {
      background: #faf5f1;
      border: 1px solid #ede1d8;
      border-radius: 10px;
      color: #060a40;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 16px;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      line-height: 1.3;
    }
    .opt-icon { font-size: 1.2rem; flex-shrink: 0; }

    .opt:hover:not(:disabled) {
      border-color: #9b9db3;
      background: #ffffff;
    }

    /* Most = navy highlight */
    .opt.most {
      border-color: #060a40;
      background: #ffffff;
    }

    /* Badge on right */
    .opt-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      flex-shrink: 0;
      background: #060a40;
      color: #fff;
    }

    /* Confirm screen */
    .confirm-heading {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      color: #060a40;
    }
    .confirm-sub {
      font-size: 13px;
      color: #9b9db3;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .summary {
      background: #faf5f1;
      border: 1px solid #ede1d8;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid #ede1d8;
      font-size: 13px;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-key { color: #6a6c8c; }
    .summary-val { font-weight: 600; font-size: 13px; text-align: right; max-width: 60%; color: #060a40; }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      padding: 13px 16px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn-primary { background: #060a40; color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-ghost {
      background: #faf5f1;
      color: #6a6c8c;
      border: 1px solid #ede1d8;
      flex: 0 0 auto;
      padding: 13px 20px;
    }
    .btn-ghost:hover { background: #ede1d8; color: #060a40; }

    /* Messages */
    .msg {
      margin-top: 12px;
      border-radius: 10px;
      font-size: 13px;
      padding: 10px 14px;
      line-height: 1.5;
      border: 1px solid;
      display: none;
    }
    .msg.visible { display: block; }
    .msg-error { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid #ffffff55;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Done screen */
    .done-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .done-icon { font-size: 1.6rem; flex-shrink: 0; }
    .done-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #060a40;
    }
    .done-sub { color: #9b9db3; font-size: 13px; line-height: 1.5; margin-bottom: 20px; }

    /* Your ranking */
    .your-ranking {
      background: #faf5f1;
      border: 1px solid #ede1d8;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .your-ranking-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-bottom: 1px solid #ede1d8;
      font-size: 14px;
      font-weight: 500;
      color: #060a40;
    }
    .your-ranking-row:last-child { border-bottom: none; }
    .rank-medal { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }

    /* Results section */
    .results-heading {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6c8c;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .results-total {
      font-size: 12px;
      color: #9b9db3;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }

    .result-row { margin-bottom: 16px; }
    .result-row:last-child { margin-bottom: 0; }
    .result-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .result-label {
      font-size: 14px;
      font-weight: 600;
      color: #060a40;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-pts {
      font-size: 12px;
      font-weight: 600;
      color: #6a6c8c;
      flex-shrink: 0;
    }
    .result-bar-track {
      background: #ede1d8;
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .result-bar-fill {
      background: #060a40;
      height: 6px;
      border-radius: 999px;
      transition: width 0.5s ease;
    }
    .result-row-bottom {
      display: flex;
      justify-content: space-between;
    }
    .result-meta { font-size: 11px; color: #9b9db3; }

    .results-explainer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #ede1d8;
      font-size: 11px;
      color: #9b9db3;
      line-height: 1.6;
    }
    .results-explainer strong { color: #6a6c8c; font-weight: 600; }

    .results-loading { font-size: 13px; color: #9b9db3; padding: 8px 0; }

    /* Back button */
    .back-btn-inline {
      background: none;
      border: none;
      color: #6a6c8c;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      margin-bottom: 16px;
      width: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }
    .back-btn-inline:hover { color: #060a40; opacity: 1; }
  </style>
</head>
<body>

<div class="card" id="app"></div>

<script>
// ── Supabase config (tokens injected by CI) ───────────────────────────────────
const SUPABASE_URL      = "__SUPABASE_URL__";
const SUPABASE_ANON_KEY = "__SUPABASE_ANON_KEY__";

const sb = {
  async insert(row) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/votes`, {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "apikey":         SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Prefer":        "return=minimal",
      },
      body: JSON.stringify(row),
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(txt || res.statusText);
    }
  },
  async selectAll() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/votes?select=rank1,rank2,rank3,rank4`,
      {
        headers: {
          "apikey":         SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        },
      }
    );
    if (!res.ok) throw new Error(res.statusText);
    return res.json();
  },
};

// ── Options ───────────────────────────────────────────────────────────────────
const OPTIONS = [
  { id: "wot",   label: "The Web of Trust", icon: "🕸️" },
  { id: "fun",   label: "Fun Money",         icon: "🎉" },
  { id: "tribe", label: "Tribal Money",      icon: "🏕️" },
  { id: "spend", label: "Spend Thanks",      icon: "🙏" },
];

const POINTS = [4, 3, 2, 1];

// ── State ─────────────────────────────────────────────────────────────────────
// step 0 — pick MOST  (all 4 shown)
// step 1 — pick LEAST (all 4 shown, most disabled)
// step 2 — pick preferred of remaining 2
// step 3 — confirm
// step 4 — done
const state = {
  step:    0,
  rank:    [null, null, null, null], // [1st, 2nd, 3rd, 4th]
  saving:  false,
  error:   null,
};

function remaining() {
  return OPTIONS.filter(o => o.id !== state.rank[0] && o.id !== state.rank[3]);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const app = document.getElementById("app");
function byId(id) { return OPTIONS.find(o => o.id === id); }

function pips(active) {
  return `<div class="pips">${[0,1,2,3].map(i =>
    `<div class="pip ${i < active ? "done" : i === active ? "active" : ""}"></div>`
  ).join("")}</div>`;
}

// ── Results ───────────────────────────────────────────────────────────────────
async function buildResultsHTML() {
  let rows;
  try {
    rows = await sb.selectAll();
  } catch (e) {
    return `<div class="msg msg-error visible">Could not load results: ${e.message}</div>`;
  }

  const total      = rows.length;
  const scores     = {};
  const firstPlace = {};
  OPTIONS.forEach(o => { scores[o.id] = 0; firstPlace[o.id] = 0; });

  rows.forEach(row => {
    [row.rank1, row.rank2, row.rank3, row.rank4].forEach((id, i) => {
      if (id && scores[id] !== undefined) scores[id] += POINTS[i];
    });
    if (row.rank1 && firstPlace[row.rank1] !== undefined) firstPlace[row.rank1]++;
  });

  const sorted   = [...OPTIONS].sort((a, b) => scores[b.id] - scores[a.id]);
  const maxScore = sorted[0] ? scores[sorted[0].id] : 1;
  const rankLabels = ["🥇", "🥈", "🥉", "4th"];

  const barsHTML = sorted.map((o, i) => {
    const pct = maxScore > 0 ? Math.round((scores[o.id] / maxScore) * 100) : 0;
    return `
      <div class="result-row">
        <div class="result-row-top">
          <span class="result-label"><span>${o.icon}</span>${o.label}</span>
          <span class="result-pts">${scores[o.id]} pts</span>
        </div>
        <div class="result-bar-track">
          <div class="result-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="result-row-bottom">
          <span class="result-meta">${rankLabels[i]} place</span>
          <span class="result-meta">#1 pick · ${firstPlace[o.id]} voter${firstPlace[o.id] !== 1 ? "s" : ""}</span>
        </div>
      </div>`;
  }).join("");

  return `
    <div class="results-heading">
      Live results
      <span class="results-total">${total} vote${total !== 1 ? "s" : ""}</span>
    </div>
    ${barsHTML}
    <div class="results-explainer">
      <strong>How scores work:</strong> 1st = 4 pts · 2nd = 3 pts · 3rd = 2 pts · 4th = 1 pt, summed across all voters.
    </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const { step, saving, error, rank } = state;

  // ── Done ──────────────────────────────────────────────────────────────────
  if (step === 4) {
    const medals = ["🥇", "🥈", "🥉", "4️⃣"];
    app.innerHTML = `
      <div class="done-header">
        <span class="done-icon">✅</span>
        <span class="done-title">Vote recorded!</span>
      </div>
      <div class="done-sub">Thanks for sharing your view.</div>
      <div class="your-ranking">
        ${rank.map((id, i) => {
          const o = byId(id);
          return `<div class="your-ranking-row">
            <span class="rank-medal">${medals[i]}</span>
            <span>${o ? o.icon + " " + o.label : id}</span>
          </div>`;
        }).join("")}
      </div>
      <div id="results-slot"><div class="results-loading">Loading results…</div></div>`;

    buildResultsHTML().then(html => {
      const slot = document.getElementById("results-slot");
      if (slot) slot.innerHTML = html;
    });
    return;
  }

  // ── Confirm ────────────────────────────────────────────────────────────────
  if (step === 3) {
    const labels = ["🥇 Most resonant", "2nd", "3rd", "🔻 Least resonant"];
    app.innerHTML = `
      ${pips(3)}
      <div class="confirm-heading">Confirm your ranking</div>
      <div class="confirm-sub">Happy with this? Hit submit to save your vote.</div>
      <div class="summary">
        ${rank.map((id, i) => {
          const o = byId(id);
          return `<div class="summary-row">
            <span class="summary-key">${labels[i]}</span>
            <span class="summary-val">${o ? o.icon + " " + o.label : id}</span>
          </div>`;
        }).join("")}
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="btn-back" ${saving ? "disabled" : ""}>← Back</button>
        <button class="btn btn-primary" id="btn-submit" ${saving ? "disabled" : ""}>
          ${saving ? '<span class="spinner"></span>Saving…' : 'Submit'}
        </button>
      </div>
      <div class="msg msg-error ${error ? "visible" : ""}">${error || ""}</div>`;

    document.getElementById("btn-back").addEventListener("click", () => {
      state.rank[1] = null;
      state.rank[2] = null;
      state.error   = null;
      state.step    = 2;
      render();
    });
    document.getElementById("btn-submit").addEventListener("click", submitVote);
    return;
  }

  // ── Round 0: pick MOST ────────────────────────────────────────────────────
  if (step === 0) {
    app.innerHTML = `
      ${pips(0)}
      <div class="round-heading">Round 1 of 3</div>
      <div class="question">Which resonates with you the most?</div>
      <div class="options">
        ${OPTIONS.map(o => `
          <button class="opt" data-id="${o.id}">
            <span class="opt-icon">${o.icon}</span>
            ${o.label}
          </button>`).join("")}
      </div>`;

    app.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        state.rank[0] = btn.dataset.id;
        state.step    = 1;
        render();
      });
    });
    return;
  }

  // ── Round 1: pick LEAST ───────────────────────────────────────────────────
  if (step === 1) {
    app.innerHTML = `
      ${pips(1)}
      <div class="round-heading">Round 2 of 3</div>
      <div class="question">Which resonates with you the least?</div>
      <div class="options">
        ${OPTIONS.map(o => {
          const isMost = o.id === rank[0];
          return `<button class="opt ${isMost ? "most" : ""}" data-id="${o.id}" ${isMost ? "disabled" : ""}>
            <span class="opt-icon">${o.icon}</span>
            ${o.label}
            ${isMost ? '<span class="opt-badge">Most</span>' : ""}
          </button>`;
        }).join("")}
      </div>`;

    const back1 = document.createElement("button");
    back1.className = "back-btn-inline";
    back1.textContent = "← Back";
    back1.addEventListener("click", () => { state.rank[0] = null; state.step = 0; render(); });
    app.insertBefore(back1, app.querySelector(".pips"));

    app.querySelectorAll(".opt:not([disabled])").forEach(btn => {
      btn.addEventListener("click", () => {
        state.rank[3] = btn.dataset.id;
        state.step    = 2;
        render();
      });
    });
    return;
  }

  // ── Round 2: pick preferred of remaining 2 ────────────────────────────────
  if (step === 2) {
    const rest = remaining();
    app.innerHTML = `
      ${pips(2)}
      <div class="round-heading">Round 3 of 3</div>
      <div class="question">And which resonates more?</div>
      <div class="options">
        ${rest.map(o => `
          <button class="opt" data-id="${o.id}">
            <span class="opt-icon">${o.icon}</span>
            ${o.label}
          </button>`).join("")}
      </div>`;

    const back2 = document.createElement("button");
    back2.className = "back-btn-inline";
    back2.textContent = "← Back";
    back2.addEventListener("click", () => { state.rank[3] = null; state.step = 1; render(); });
    app.insertBefore(back2, app.querySelector(".pips"));

    app.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", () => {
        const picked  = btn.dataset.id;
        const other   = rest.find(o => o.id !== picked);
        state.rank[1] = picked;
        state.rank[2] = other ? other.id : null;
        state.step    = 3;
        render();
      });
    });
    return;
  }
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submitVote() {
  state.saving = true;
  state.error  = null;
  render();

  try {
    await sb.insert({
      wallet: "anon",
      rank1:  state.rank[0],
      rank2:  state.rank[1],
      rank3:  state.rank[2],
      rank4:  state.rank[3],
    });
    state.saving = false;
    state.step   = 4;
    render();
  } catch (err) {
    state.saving = false;
    state.error  = err.message || "Could not save your vote. Please try again.";
    render();
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
